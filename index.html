<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary Mummy & Pappa</title>
    <!-- Import Elegant Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Container for floating hearts/petals animation -->
    <div id="animation-container"></div>

    <main class="welcome-container">
        <div class="content-box">
            <h1 class="main-heading"
                data-en="Celebrating the Beautiful Journey of Love"
                data-kn="ಪ್ರೀತಿಯ ಸುಂದರ ಪ್ರಯಾಣವನ್ನು ಆಚರಿಸುತ್ತಿದ್ದೇವೆ">Celebrating the Beautiful Journey of Love</h1>

            <h2 class="sub-heading"
                data-en="Happy Wedding Anniversary to the most wonderful parents"
                data-kn="ಅದ್ಭುತ ಪೋಷಕರಿಗೆ ಶುಭ ವಿವಾಹ ವಾರ್ಷಿಕೋತ್ಸವ">Happy Wedding Anniversary to the most wonderful parents</h2>

            <div class="names-section">
                <span class="name" data-en="Mummy" data-kn="ಅಮ್ಮ">Mummy</span>
                <span class="heart-icon">❤️</span>
                <span class="name" data-en="Pappa" data-kn="ಅಪ್ಪ">Pappa</span>
            </div>

            <p class="message"
               data-en="A small surprise created with love to celebrate your beautiful journey together."
               data-kn="ನಿಮ್ಮ ಸುಂದರ ಯಾತ್ರೆಯನ್ನು ಆಚರಿಸಲು ಪ್ರೀತಿಯಿಂದ ರಚಿಸಿದ ಪುಟ್ಟ ಆಶ್ಚರ್ಯ.">
                A small surprise created with love to celebrate your beautiful journey together.
            </p>

            <button class="start-btn" onclick="startJourney()">
                <span class="btn-text" data-en="Start the Journey" data-kn="ಯಾತ್ರೆ ಆರಂಭಿಸಿ">Start the Journey</span>
                <span class="btn-icon">✨</span>
            </button>
        </div>
    </main>

    <script src="translate.js"></script>
    <script src="script.js"></script>
</body>

</html>
